mode: edge

node:
  id: edge-002
  name: Lab Edge B
  location: single-pc-lab

mysql:
  host: 127.0.0.1
  port: 3308
  username: sync_user
  password: sync_password
  database: scada_edge

rabbitmq:
  mode: external
  install: false
  local_url: amqp://sync:sync_password@127.0.0.1:5674/edge-b-sync
  server_url: amqp://sync:sync_password@127.0.0.1:5675/server-sync
  management_url: http://127.0.0.1:15674
  username: sync
  password: sync_password
  vhost: edge-b-sync

cdc:
  type: stub
  reader_name: edge-002
  canal_addr: 127.0.0.1:11112
  destination: edge-002
  username: ""
  password: ""
  filter: scada_edge\..*
  batch_size: 1000
  use_gtid: false

sync:
  upload_batch_size: 50
  dispatch_batch_size: 50
  flush_interval_millis: 500
  retry_interval_seconds: 2
  heartbeat_interval_seconds: 15

log_web:
  enable: false
  bind: 127.0.0.1
  port: 18082
  token: lab_token

mcp_server:
  enable: false

security:
  admin_password: admin-pass
  exit_password: exit-pass
