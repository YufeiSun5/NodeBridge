mode: edge

node:
  id: edge-001
  name: 一号产线
  location: 大连工厂-一车间

mysql:
  host: 127.0.0.1
  port: 3306
  username: sync_user
  password: encrypted_password
  database: scada_edge

rabbitmq:
  mode: managed
  install: true
  local_url: amqp://sync:password@127.0.0.1:5672/edge-sync
  server_url: amqp://edge-001:password@192.168.1.10:5672/server-sync
  management_url: http://127.0.0.1:15672
  username: edge-001
  password: encrypted_password
  vhost: /edge-sync

cdc:
  type: canal
  reader_name: edge-001
  canal_addr: 127.0.0.1:11111
  destination: edge-001
  username: ""
  password: encrypted_password
  filter: scada_edge\..*
  batch_size: 1000
  use_gtid: false

sync:
  upload_batch_size: 500
  retry_interval_seconds: 10
  heartbeat_interval_seconds: 15

log_web:
  enable: false
  bind: 127.0.0.1
  port: 18080
  token: encrypted_token
