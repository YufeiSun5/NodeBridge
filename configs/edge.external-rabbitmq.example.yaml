mode: edge

node:
  id: edge-001
  name: 一号产线
  location: 大连工厂-一车间

mysql:
  host: 127.0.0.1
  port: 3306
  username: sync_user
  password: encrypted_password
  database: scada_edge

rabbitmq:
  mode: external
  install: false
  local_url: amqp://edge-001:encrypted_password@rabbitmq.example.com:5672/edge-sync
  server_url: amqp://edge-001:encrypted_password@rabbitmq.example.com:5672/server-sync
  management_url: https://rabbitmq.example.com:15672
  username: edge-001
  password: encrypted_password
  vhost: /server-sync

cdc:
  type: canal
  mode: external
  install: false
  reader_name: edge-001
  canal_addr: 127.0.0.1:11111
  destination: edge-001
  batch_size: 1000
  use_gtid: false

sync:
  upload_batch_size: 50
  dispatch_batch_size: 50
  flush_interval_millis: 500
  retry_interval_seconds: 10
  heartbeat_interval_seconds: 15

log_web:
  enable: false
  bind: 127.0.0.1
  port: 18080
  token: encrypted_token

mcp_server:
  enable: false

security:
  admin_password: encrypted_admin_password
  exit_password: encrypted_exit_password
